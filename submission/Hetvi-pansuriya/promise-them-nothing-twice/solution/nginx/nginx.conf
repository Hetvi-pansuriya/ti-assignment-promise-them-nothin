# nginx/nginx.conf
#
# Plain round-robin load balancer for the three RelayAPI app nodes.
#
# Design constraints enforced here:
#  - NO ip_hash, NO sticky_sessions, NO hash — plain round-robin only.
#    This matches the architectural requirement: nodes are stateless and share
#    nothing; any node can serve any request because all state lives in Redis.
#  - Redis is NOT proxied here; it lives on the Docker-internal network only.
#
# upstream round-robin order: node-a → node-b → node-c → node-a → ...
# Each Compose app service listens on port 3000 internally.

upstream relayapi_nodes {
    # Plain round-robin (nginx default when no balancing directive is set).
    # Explicitly: do NOT add ip_hash, least_conn, random, or hash here.
    server app-node-a:3000;
    server app-node-b:3000;
    server app-node-c:3000;
}

server {
    listen 80;

    location / {
        proxy_pass         http://relayapi_nodes;

        # Forward the real client IP so the app can log it
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Disable proxy-level buffering so rate-limit headers pass through
        # immediately to the client without waiting for the full response body.
        proxy_buffering    off;
    }
}
